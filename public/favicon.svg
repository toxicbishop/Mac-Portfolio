<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
    <!-- Main green gradient -->
    <linearGradient id="toxic-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/> <!-- Emerald Green -->
      <stop offset="50%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/> <!-- Deep Green -->
    </linearGradient>
    <!-- Border glow filter -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Ambient Glow -->
  <circle cx="256" cy="256" r="220" fill="url(#glow)" />

  <!-- Code Brackets `<` and `>` (Glowing background) -->
  <g stroke="url(#toxic-grad)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.4" filter="url(#neon-glow)">
    <!-- Left Bracket < -->
    <path d="M 120 160 L 40 256 L 120 352" />
    <!-- Right Bracket > -->
    <path d="M 392 160 L 472 256 L 392 352" />
  </g>

  <!-- Stylized Chess Bishop -->
  <g fill="url(#toxic-grad)" filter="url(#neon-glow)">
    <!-- Small Cross/Sphere on Top of Bishop -->
    <circle cx="256" cy="90" r="14" />
    <rect x="252" y="70" width="8" height="12" rx="2" />
    <rect x="250" y="74" width="12" height="4" rx="1" />

    <!-- Bishop Head (Mitre) -->
    <path d="M 256 110 C 220 150 200 200 210 240 C 220 240 230 235 240 230 C 248 226 256 220 256 220 C 256 220 264 226 272 230 C 282 235 292 240 302 240 C 312 200 292 150 256 110 Z" />
    
    <!-- Diagonal Cut in Bishop Head (Classic feature) -->
    <path d="M 245 155 L 270 170" stroke="#000" stroke-width="8" stroke-linecap="round" opacity="0.5" />

    <!-- Collar / Ring -->
    <rect x="220" y="250" width="72" height="12" rx="6" />

    <!-- Body / Pillar -->
    <path d="M 230 270 L 210 370 L 302 370 L 282 270 Z" />

    <!-- Base -->
    <rect x="180" y="380" width="152" height="24" rx="8" />
    <rect x="160" y="412" width="192" height="20" rx="6" />
  </g>
</svg>